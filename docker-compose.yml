services:
  app:
    image: ghcr.io/${GHCR_IMAGE:-alvin000009238/school_grades}:latest
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - TZ=Asia/Taipei

    depends_on:
      - redis
    networks:
      - app_network
    deploy:
      restart_policy:
        condition: any
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - app_network
    deploy:
      restart_policy:
        condition: any

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - app_network
    deploy:
      restart_policy:
        condition: any
    volumes:
      - redis_data:/data

networks:
  app_network:
    driver: overlay

volumes:
  redis_data:
