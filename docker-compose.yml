services:
  app:
    build: .
    image: ghcr.io/${GHCR_IMAGE:-alvin000009238/clhs_score}:latest
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Taipei
      - SCHOOL_SOCKS_PROXY=${TS_EXIT_NODE:+socks5://tailscale:1055}
    ports:
      - "5000:5000"

    depends_on:
      - redis
    deploy:
      restart_policy:
        condition: any
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-score-docker}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--exit-node=${TS_EXIT_NODE:-}
      - TS_TAILSCALED_EXTRA_ARGS=--socks5-server=0.0.0.0:1055
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
    volumes:
      - tailscale_state:/var/lib/tailscale
    deploy:
      restart_policy:
        condition: any
    profiles:
      - tailscale

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    env_file:
      - .env
    deploy:
      restart_policy:
        condition: any

  redis:
    image: redis:7-alpine
    deploy:
      restart_policy:
        condition: any
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  tailscale_state:
