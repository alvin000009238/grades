<!DOCTYPE html>
<html>
<head></head>
<body>
    <div id="scoresGrid"></div>
    <script>
        const grid = document.getElementById('scoresGrid');

        // Setup
        const subjects = Array.from({length: 1000}, (_, i) => ({
            ScoreDisplay: 85, Score: 85,
            ClassAVGScoreDisplay: 80, ClassAVGScore: 80,
            SubjectName: `Subject ${i}`,
            ClassRank: 5, ClassRankCount: 40,
            YearRank: 50, YearRankCount: 400
        }));

        function escapeHTML(str) { return str; }
        function getNumericScore(d, s) { return s; }
        function getScoreClass(s) { return 'high'; }
        function getRankPercentileClass(p) { return 'pr-good'; }

        // Test 1: innerHTML +=
        console.time('String Concatenation');
        let htmlStr = '';
        subjects.forEach(subject => {
            htmlStr += `<div class="score-card">${subject.SubjectName}</div>`;
        });
        grid.innerHTML = htmlStr;
        console.timeEnd('String Concatenation');

        // Test 2: appendChild
        grid.innerHTML = '';
        console.time('createElement + appendChild');
        subjects.forEach(subject => {
            const card = document.createElement('div');
            card.className = 'score-card';
            card.innerHTML = `<div class="score-card">${subject.SubjectName}</div>`;
            grid.appendChild(card);
        });
        console.timeEnd('createElement + appendChild');

        // Test 3: DocumentFragment
        grid.innerHTML = '';
        console.time('DocumentFragment');
        const fragment = document.createDocumentFragment();
        subjects.forEach(subject => {
            const card = document.createElement('div');
            card.className = 'score-card';
            card.innerHTML = `<div class="score-card">${subject.SubjectName}</div>`;
            fragment.appendChild(card);
        });
        grid.appendChild(fragment);
        console.timeEnd('DocumentFragment');
    </script>
</body>
</html>
