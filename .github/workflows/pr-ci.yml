name: PR CI

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate frontend and backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run Frontend Tests
        run: npm run test

      - name: Build frontend assets
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run Backend Tests
        run: pytest tests/backend/

      - name: Compile backend sources
        run: python -m compileall app fetcher.py server.py

      - name: Smoke test Flask app factory
        env:
          APP_ENV: testing
        run: |
          python - <<'PY'
          from app import create_app

          app = create_app()
          print(f"Loaded Flask app with {len(app.url_map._rules)} routes")
          PY
